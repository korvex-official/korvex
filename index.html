<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KORVEX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin:0;
background:black;
color:white;
font-family: Arial;
text-align:center;
}

#splash {
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#logo {
width:200px;
}

#loading {
width:200px;
height:4px;
background:#333;
margin-top:20px;
overflow:hidden;
}

#bar {
width:0%;
height:100%;
background:red;
animation: load 2s forwards;
}

@keyframes load {
to { width:100%; }
}

#main {
display:none;
padding:30px;
}

button {
background:#111;
color:white;
border:1px solid white;
padding:15px;
margin:10px;
width:200px;
}

button:hover {
background:#222;
}
</style>
</head>

<body>

<div id="splash">
<h1>KORVEX</h1>
<div id="loading"><div id="bar"></div></div>
</div>

<div id="main">

<h1>KORVEX HUB</h1>

<button onclick="openLabs()">🧩 KORVEX LABS</button>
<button onclick="openBook()">📖 Lire le Tome 1</button>
<button onclick="openDiscord()">💬 Discord</button>

</div>

<script>
setTimeout(() => {
document.getElementById("splash").style.display="none";
document.getElementById("main").style.display="block";
}, 2000);

function openLabs(){
alert("LABS bientôt connecté");
}

function openBook(){
alert("Livre bientôt intégré");
}

function openDiscord(){
window.open("TON LIEN DISCORD ICI");
}
</script>

</body>
</html>
