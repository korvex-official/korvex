<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORVEX</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; text-align: center; }
        
        /* Splash simplifiée */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        
        /* Menu */
        #main { padding-top: 50px; }
        .logo { width: 120px; margin-bottom: 20px; }
        .btn { display: block; margin: 15px auto; padding: 15px; width: 80%; background: #111; color: #fff; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <p>INITIALISATION KORVEX...</p>
    </div>

    <div id="main">
        <img src="logo.png" class="logo" alt="Logo">
        <div class="btn">KORVEX LABS</div>
        <div class="btn">PROTOCOLE P9</div>
        <div class="btn">DISCORD</div>
    </div>

    <script>
        // On attend que la page charge, puis on vire le splash après 1.5 secondes
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('splash').style.display = 'none';
            }, 1500);
        };
    </script>
</body>
</html>
